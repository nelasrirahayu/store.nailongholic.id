<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang - Nailongholic.id</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-yellow-50">

    <div class="max-w-5xl mx-auto p-6">

        <h1 class="text-4xl font-bold text-center text-yellow-600 mb-8">
            🛒 Keranjang Belanja
        </h1>

        <!-- Produk -->
        <div class="bg-white rounded-2xl shadow-lg p-5 flex items-center gap-5">

            <img src="gantungan.jpg"
                 class="w-28 h-28 object-cover rounded-xl">

            <div class="flex-1">
                <h2 class="text-xl font-bold">
                    Gantungan Nailong
                </h2>

                <div class="flex items-center gap-3 mt-3">

    <button onclick="kurangProduk()"
        class="bg-yellow-400 hover:bg-yellow-500 text-white w-8 h-8 rounded-lg font-bold">
        −
    </button>

    <span id="jumlahProduk" class="font-bold text-lg">
        1
    </span>

    <button onclick="tambahProduk()"
        class="bg-yellow-400 hover:bg-yellow-500 text-white w-8 h-8 rounded-lg font-bold">
        +
    </button>

</div>

                <p id="hargaProduk" class="text-yellow-600 text-2xl font-bold mt-2">
    Rp75.000
</p>
            </div>

            <button
                class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
                Hapus
            </button>

        </div>

        <!-- Total -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mt-8">

            <div class="flex justify-between text-xl font-bold">
                <span>Total Belanja</span>
                <span id="totalBelanja" class="text-yellow-600">
    Rp75.000
</span>
            </div>

            <button
                onclick="goToCheckout()"
                class="w-full mt-6 bg-yellow-500 hover:bg-yellow-600 text-white py-4 rounded-xl text-lg font-bold">

                Lanjut ke Checkout →
            </button>

        </div>

        <!-- Tombol Kembali -->
        <div class="text-center mt-6">

            <a href="index.html"
               class="text-yellow-600 font-semibold hover:underline">
                ← Kembali Belanja
            </a>

        </div>

    </div>

    <script>

let jumlah = 1;
const hargaSatuan = 75000;

function updateHarga(){

    document.getElementById("jumlahProduk").innerHTML = jumlah;

    let total = jumlah * hargaSatuan;

    document.getElementById("hargaProduk").innerHTML =
    "Rp " + total.toLocaleString("id-ID");

    document.getElementById("totalBelanja").innerHTML =
    "Rp " + total.toLocaleString("id-ID");

}

function tambahProduk(){
    jumlah++;
    updateHarga();
}

function kurangProduk(){

    if(jumlah > 1){
        jumlah--;
        updateHarga();
    }

}

function goToCheckout(){
    window.location.href = "checkout.html";
}

</script>

</body>
</html>
