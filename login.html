<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Nailongholic.id</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body class="bg-yellow-50 flex justify-center items-center min-h-screen">

<div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">

    <div class="text-center">

        <img src="logo.jpg"
        class="w-24 h-24 rounded-full mx-auto mb-4 object-cover">

        <h1 class="text-3xl font-bold text-yellow-600">
            Login
        </h1>

        <p class="text-gray-500 mb-6">
            Selamat datang di Nailongholic.id
        </p>

    </div>

    <input
        id="username"
        type="text"
        placeholder="Username"
        class="w-full border rounded-xl p-3 mb-4">

    <input
        id="password"
        type="password"
        placeholder="Password"
        class="w-full border rounded-xl p-3 mb-6">

    <button
    onclick="login()"
    class="w-full bg-yellow-500 hover:bg-yellow-600 text-white py-3 rounded-xl font-bold">
    Login
</button>

<p class="text-center mt-4">
    Belum punya akun?
    <a href="register.html"
       class="text-yellow-600 font-bold hover:underline">
       Daftar
    </a>
</p>

</div>

<script>

function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let user = localStorage.getItem("username");
    let pass = localStorage.getItem("password");

    if(username == user && password == pass){

        localStorage.setItem("login","true");

        alert("Login berhasil!");

        window.location.href="index.html";

    }else{

        alert("Username atau Password salah!");

    }

}

</script>

</body>
</html>
