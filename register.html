<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Nailongholic.id</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-yellow-50 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">

    <div class="text-center">

        <img src="image/logo.jpg"
             class="w-24 h-24 rounded-full mx-auto mb-4 object-cover">

        <h1 class="text-3xl font-bold text-yellow-600">
            Daftar Akun
        </h1>

        <p class="text-gray-500 mb-6">
            Buat akun Nailongholic.id
        </p>

    </div>

    <input
        id="nama"
        type="text"
        placeholder="Nama Lengkap"
        class="w-full border rounded-xl p-3 mb-4">

    <input
        id="username"
        type="text"
        placeholder="Username"
        class="w-full border rounded-xl p-3 mb-4">

    <input
        id="password"
        type="password"
        placeholder="Password"
        class="w-full border rounded-xl p-3 mb-4">

    <input
        id="konfirmasi"
        type="password"
        placeholder="Konfirmasi Password"
        class="w-full border rounded-xl p-3 mb-6">

    <button
        onclick="register()"
        class="w-full bg-yellow-500 hover:bg-yellow-600 text-white py-3 rounded-xl font-bold">

        Daftar

    </button>

    <p class="text-center mt-5">
        Sudah punya akun?
        <a href="login.html"
           class="text-yellow-600 font-bold hover:underline">
            Login
        </a>
    </p>

</div>

<script>

function register(){

    let nama = document.getElementById("nama").value;
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let konfirmasi = document.getElementById("konfirmasi").value;

    if(nama=="" || username=="" || password==""){
        alert("Semua data harus diisi!");
        return;
    }

    if(password != konfirmasi){
        alert("Password tidak sama!");
        return;
    }

    localStorage.setItem("username", username);
    localStorage.setItem("password", password);

    alert("Registrasi berhasil!");

    window.location.href = "login.html";

}

</script>

</body>
</html>
