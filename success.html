<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesanan Berhasil - Nailongholic.id</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-yellow-50 min-h-screen flex items-center justify-center">

  <div class="bg-white p-10 rounded-3xl shadow-xl text-center max-w-md w-full">

    <!-- Logo -->
    <img src="image/logo.jpg"
     class="w-28 h-28 rounded-full mx-auto shadow-lg object-cover">

    <!-- Icon -->
    <i class="fa-solid fa-circle-check text-7xl text-yellow-500 mt-6"></i>

    <!-- Judul -->
    <h1 class="text-3xl font-bold text-yellow-600 mt-5">
      Pembayaran Berhasil!
    </h1>

    <p class="text-gray-600 mt-3">
      Terima kasih sudah berbelanja di
      <span class="font-bold text-yellow-500">
        Nailongholic.id
      </span>.
      Pesananmu sedang kami proses.
    </p>

    <!-- Detail -->
    <div class="bg-yellow-100 rounded-2xl p-5 mt-6">

      <p class="text-gray-700">
        <strong>Order ID</strong>
      </p>

      <p class="font-mono font-bold text-yellow-700">
        NH-2025-001
      </p>

      <hr class="my-4">

      <p class="text-gray-700">
        Total Pembayaran
      </p>

      <p id="totalBayar" class="text-2xl font-bold text-yellow-600">
    Rp 0
</p>
      </p>

      <p class="text-sm text-gray-500 mt-2">
        (Nanti bisa dibuat otomatis dari JavaScript)
      </p>

    </div>

    <!-- Tombol -->
    <a href="index.html"
       class="block mt-8 bg-yellow-500 hover:bg-yellow-600 text-white py-3 rounded-xl font-bold transition">
      🏠 Kembali ke Beranda
    </a>

  </div>
<script>
const produk = JSON.parse(localStorage.getItem("checkoutProduk"));

if (produk) {
    document.getElementById("totalBayar").innerText =
        "Rp " + produk.price.toLocaleString("id-ID");
}
</script>
</body>
</html>
